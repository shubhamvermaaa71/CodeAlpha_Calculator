<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ultra Premium Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Segoe UI,sans-serif}
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#081120,#13254a,#0b1020);
overflow:hidden;
padding:20px;
}
.title{
text-align:center;
color:white;
font-size:2rem;
font-weight:900;
letter-spacing:4px;
margin-bottom:18px;
}

.calc{
position:relative;
width:400px;
max-width:100%;
padding:22px;
border-radius:40px;
overflow:hidden;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.18);
box-shadow:0 30px 60px rgba(0,0,0,.45);
}

/* Liquid glass shine */
.calc::before{
content:'';
position:absolute;
top:-100%;
left:-50%;
width:80%;
height:300%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.08),
transparent
);
transform:rotate(20deg);
animation:shine 8s linear infinite;
}
@keyframes shine{
to{transform:translateX(500px) rotate(20deg);}
}

/* particles */
.p{
position:absolute;
border-radius:50%;
filter:blur(45px);
opacity:.45;
animation:float 15s ease-in-out infinite;
}
.p1{width:130px;height:130px;background:#4fc3f7;left:-20px;top:50px;}
.p2{width:150px;height:150px;background:#7c4dff;right:-30px;top:150px;}
.p3{width:110px;height:110px;background:#00e5ff;left:120px;bottom:-30px;}
@keyframes float{
50%{transform:translate(50px,-50px) scale(1.2)}
}

.display{
height:95px;
border-radius:28px;
background:rgba(255,255,255,.08);
display:flex;
justify-content:flex-end;
align-items:center;
padding:20px;
font-size:2rem;
color:white;
overflow:hidden;
position:relative;
z-index:2;
margin-bottom:16px;
box-shadow:inset 0 4px 20px rgba(0,0,0,.25);
}

#displayText{
display:flex;
align-items:center;
gap:1px;
}

.char{
opacity:0;
animation:slideIn .18s forwards;
}
@keyframes slideIn{
from{
opacity:0;
transform:translateX(12px);
}
to{
opacity:1;
transform:translateX(0);
}
}

.cursor{
animation:blink 1s infinite;
font-weight:bold;
margin-left:2px;
}
@keyframes blink{
50%{opacity:0}
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
position:relative;
z-index:2;
}

button{
height:65px;
border:none;
border-radius:24px;
color:white;
font-size:1.1rem;
cursor:pointer;
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
transition:.15s;
box-shadow:
0 10px 20px rgba(0,0,0,.25),
inset 1px 1px 1px rgba(255,255,255,.15);
}

button:hover{
transform:translateY(-2px);
}

button:active,.pressed{
transform:translateY(5px) scale(.96);
outline:2px solid rgba(255,255,255,.8);
outline-offset:2px;
box-shadow:inset 0 6px 14px rgba(0,0,0,.5);
}

.orange{
background:#ff8a24;
box-shadow:0 0 25px rgba(255,138,36,.35);
}

@media(max-width:450px){
button{height:58px}
.display{font-size:1.6rem}
}
</style>
</head>
<body>

<div>
<div class="title">CALCULATOR</div>

<div class="calc">
<div class="p p1"></div>
<div class="p p2"></div>
<div class="p p3"></div>

<div class="display">
<div id="displayText"></div>
<div class="cursor">|</div>
</div>

<div class="grid">
<button class="orange" onclick="clearDisplay()">C</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button onclick="append('+')">+</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">÷</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">×</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">−</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="backspace()">⌫</button>
<button class="orange" onclick="calculate()">=</button>
</div>
</div>
</div>

<script>
let expr="";
const display=document.getElementById("displayText");

function render(){
display.innerHTML='';
[...expr].forEach((c,i)=>{
const s=document.createElement('span');
s.className='char';
s.style.animationDelay=(i*0.01)+'s';
s.textContent=c;
display.appendChild(s);
});
}

function append(v){
expr+=v;
render();
}

function clearDisplay(){
expr='';
render();
}

function backspace(){
expr=expr.slice(0,-1);
render();
}

function calculate(){
try{
expr=String(eval(expr));
render();
}catch{
expr='Error';
render();
}
}

document.addEventListener('keydown',e=>{
let k=e.key;
if(/[0-9]/.test(k)||['+','-','*','/','.','(',')'].includes(k)) append(k);
if(k==='Enter') calculate();
if(k==='Backspace') backspace();
if(k==='Escape') clearDisplay();
});
</script>

</body>
</html>
