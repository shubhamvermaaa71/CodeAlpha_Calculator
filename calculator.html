<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Calculator</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div>
<div class="title">CALCULATOR</div>

<div class="calc">
<div class="p p1"></div>
<div class="p p2"></div>
<div class="p p3"></div>

<div class="display">
<div id="displayText"></div>
<div class="cursor">|</div>
</div>

<div class="grid">
<button class="orange" onclick="clearDisplay()">C</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button onclick="append('+')">+</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">÷</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">×</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">−</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="backspace()">⌫</button>
<button class="orange" onclick="calculate()">=</button>
</div>
</div>
</div>

<script>
let expr="";
const display=document.getElementById("displayText");

function render(){
display.innerHTML='';
[...expr].forEach((c,i)=>{
const s=document.createElement('span');
s.className='char';
s.style.animationDelay=(i*0.01)+'s';
s.textContent=c;
display.appendChild(s);
});
}

function append(v){
expr+=v;
render();
}

function clearDisplay(){
expr='';
render();
}

function backspace(){
expr=expr.slice(0,-1);
render();
}

function calculate(){
try{
expr=String(eval(expr));
render();
}catch{
expr='Error';
render();
}
}

document.addEventListener('keydown',e=>{
let k=e.key;
if(/[0-9]/.test(k)||['+','-','*','/','.','(',')'].includes(k)) append(k);
if(k==='Enter') calculate();
if(k==='Backspace') backspace();
if(k==='Escape') clearDisplay();
});
</script>

</body>
</html>
